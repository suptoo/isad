        "Because kernel size has zero effect on image quality and is purely a stylistic preference with no consequences",
        "Because larger kernels always run in exactly the same amount of time as smaller kernels, with no performance difference",
        "Because OpenCV restricts every single filter in its library to one single, fixed kernel size by design"
      ],
      correct: 0,
      explain: "There's no single 'correct' kernel size — a size small enough to preserve fine detail may not remove enough noise, while a size large enough to remove noise thoroughly will also blur away legitimate detail. This tension is exactly the trade-off that shows up repeatedly across the lab's smoothing filter exercises, and choosing the right size always depends on the specific image and the specific problem being solved."
    },
    {
      q: "Which statement correctly compares the median filter versus the Gaussian filter for denoising an image contaminated with salt-and-pepper noise?",
      options: [
        "The median filter is generally better suited to salt-and-pepper (impulse) noise, since it discards outlier extreme values rather than blending them in, whereas the Gaussian filter tends to blur those impulses into visible smudges rather than eliminating them",
        "The Gaussian filter is always strictly better for every single type of noise, including salt-and-pepper noise",
        "The two filters perform identically on every type of image noise, with no meaningful difference",
        "Neither filter has any measurable effect on salt-and-pepper noise whatsoever"
      ],
      correct: 0,
      explain: "This distinction is exactly why the lab's exercises ask you to compare averaging, Gaussian, and median filters directly on salt-and-pepper noise: the median filter's outlier-discarding, sort-based behavior makes it far more effective at removing sharp, extreme impulse noise, while linear filters like Gaussian instead blend those extreme values into their surroundings, spreading rather than eliminating the damage."
    },
    {
      q: "What is the overarching relationship between 'image deblurring' and 'image denoising' as goals in spatial filtering?",
      options: [
        "Deblurring generally aims to sharpen or restore detail lost to blur (using operators like the Laplacian or unsharp masking), while denoising aims to suppress unwanted random variation (using smoothing filters like averaging, Gaussian, or median) — the two goals often pull in opposite directions and must be balanced carefully",
        "They are exactly the same operation under two different names, and always use identical kernels",
        "Deblurring only ever applies to audio files, and has nothing to do with images at all",
        "Denoising always requires first converting the image into a video file"
      ],
      correct: 0,
      explain: "Deblurring and sharpening filters push toward amplifying high-frequency detail and edges, while denoising and smoothing filters push toward suppressing that same high-frequency content. Because random noise and genuine fine detail often occupy a similar frequency range, these two goals are frequently in direct tension — sharpening an image can amplify noise, and denoising an image can blur genuine detail — which is precisely why choosing the right filter and the right strength for a given image is such a central skill in this lab."
    },
    {
      q: "Considering all the filters covered in this lab — averaging, weighted average, Gaussian, median, min, max, midpoint, Laplacian, unsharp masking, high-boost, and Sobel — what is the single most important factor that determines whether a filter is used for smoothing or sharpening?",
      options: [
        "Whether the filter's kernel weights and design act to suppress high-frequency variation (smoothing, as in averaging, Gaussian, and median) or amplify and emphasize it (sharpening, as in Laplacian, unsharp masking, and Sobel)",
        "The specific file format the image happens to be saved in once processing is finished",
        "The particular programming language used to implement the filter's code",
        "The number of megapixels captured by the original camera sensor that took the photo"
      ],
      correct: 0,
      explain: "Every filter in this lab, no matter how different its kernel looks, ultimately falls into one of two camps based on how it treats high-frequency content: smoothing filters suppress it to reduce noise and detail, while sharpening filters amplify it to enhance edges and fine structure. Recognizing this single organizing principle is the key to understanding why the lab groups its experiments the way it does, and to choosing the right tool the next time you face a real filtering problem."
    }
  ]
}
];

/* =========================================================
   APP LOGIC
   ========================================================= */
const TOTAL_Q = DATA.reduce((n,c)=>n+c.questions.length,0);
let state = { screen:'welcome', c:0, q:0 };
let answered = {}; // key "c-q" -> selectedIndex

const card = document.getElementById('card');

function keyFor(c,q){ return c+'-'+q; }

function answeredCount(){
  return Object.keys(answered).length;
}

function conceptAnsweredCount(c){
  let n=0;
  for(let i=0;i<DATA[c].questions.length;i++){ if(answered[keyFor(c,i)]!==undefined) n++; }
  return n;
}

function updateOverallProgress(){
  const done = answeredCount();
  const pct = Math.round((done/TOTAL_Q)*100);
  document.getElementById('progLabel').textContent = done + ' / ' + TOTAL_Q + ' answered';
  document.getElementById('progPercent').textContent = pct + '%';
  document.getElementById('progFill').style.width = pct + '%';
}

function letterFor(i){ return String.fromCharCode(65+i); }

function render(){
  updateOverallProgress();
  if(state.screen==='welcome') return renderWelcome();
  if(state.screen==='intro') return renderIntro();
  if(state.screen==='question') return renderQuestion();
  if(state.screen==='complete') return renderComplete();
  if(state.screen==='final') return renderFinal();
}

function renderWelcome(){
  card.innerHTML = `
    <div class="welcome">
      <h2>Learn convolution &amp; spatial filtering, one question at a time.</h2>
      <p>100 multiple-choice questions covering everything in Lab 3 — kernels, padding, averaging, Gaussian and median filters, min/max/midpoint filters, Laplacian sharpening, unsharp masking, and the Sobel operator. Answer, see why, move on. No scores, no pressure — just build real understanding.</p>
      <div class="stats">
        <div class="stat"><div class="n">100</div><div class="l">Questions</div></div>
        <div class="stat"><div class="n">12</div><div class="l">Concepts</div></div>
        <div class="stat"><div class="n">1</div><div class="l">Question at a time</div></div>
      </div>
      <div class="actions" style="justify-content:flex-start;">
        <button class="btn btn-primary" onclick="goToConceptIntro(0)">Start Learning →</button>
      </div>
    </div>
  `;
}

function renderIntro(){
  const c = DATA[state.c];
  card.innerHTML = `
    <div class="concept-intro">
      <div class="concept-tag">Concept ${state.c+1} of ${DATA.length}</div>
      <h2>${c.title}</h2>
      <p>${c.blurb}</p>
      <div class="actions" style="justify-content:flex-start;">
        <button class="btn btn-primary" onclick="startConceptQuestions()">Begin (${c.questions.length} questions) →</button>
      </div>
    </div>
  `;
}

function startConceptQuestions(){
  state.screen='question';
  state.q=0;
  render();
}

function renderQuestion(){
  const c = DATA[state.c];
  const item = c.questions[state.q];
  const k = keyFor(state.c, state.q);
  const picked = answered[k];
  const isAnswered = picked !== undefined;

  let optsHtml = '';
  item.options.forEach((opt, i)=>{
    let cls = 'opt';
    if(isAnswered){
      cls += ' locked';
      if(i === item.correct) cls += ' correct';
      else if(i === picked) cls += ' incorrect';
      else cls += ' dim';
    }
    optsHtml += `<button class="${cls}" onclick="selectOption(${i})" ${isAnswered?'disabled':''}>
        <span class="letter">${letterFor(i)}</span><span>${opt}</span>
      </button>`;
  });

  let explainHtml = '';
  if(isAnswered){
    const wasCorrect = picked === item.correct;
    explainHtml = `
      <div class="explain show ${wasCorrect?'ok':'no'}">
        <div class="tag">${wasCorrect? "✓ Correct — here is why" : "✕ Not quite — here is the full picture"}</div>
        <p>${item.explain}</p>
      </div>`;
  }

  const isLastInConcept = state.q === c.questions.length - 1;
  const nextLabel = isAnswered ? (isLastInConcept ? 'Finish Concept →' : 'Next Question →') : '';

  card.innerHTML = `
    <div class="q-meta">
      <div class="concept-tag">${c.title}</div>
      <div class="q-count">Q${state.q+1} / ${c.questions.length}</div>
    </div>
    <p class="q-text">${item.q}</p>
    <div class="options">${optsHtml}</div>
    ${explainHtml}
    <div class="actions">
      ${isAnswered ? `<button class="btn btn-primary" onclick="goNext()">${nextLabel}</button>` : ''}
    </div>
  `;
}

function selectOption(i){
  const k = keyFor(state.c, state.q);
  if(answered[k] !== undefined) return;
  answered[k] = i;
  render();
}

function goNext(){
  const c = DATA[state.c];
  if(state.q < c.questions.length - 1){
    state.q += 1;
    state.screen = 'question';
    render();
  } else {
    state.screen = 'complete';
    render();
  }
}

function renderComplete(){
  const c = DATA[state.c];
  const isLastConcept = state.c === DATA.length - 1;
  card.innerHTML = `
    <div class="complete">
      <div class="complete-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="#35c9b0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <div class="concept-tag">Concept ${state.c+1} of ${DATA.length} complete</div>
      <h2>${c.title} — done.</h2>
      <div class="takeaway">${c.takeaway}</div>
      <div class="actions" style="justify-content:flex-start;">
        ${isLastConcept
          ? `<button class="btn btn-primary" onclick="goToFinal()">See Final Summary →</button>`
          : `<button class="btn btn-primary" onclick="goToConceptIntro(${state.c+1})">Continue to Concept ${state.c+2} →</button>`}
      </div>
    </div>
  `;
}

function goToConceptIntro(idx){
  state.c = idx;
  state.q = 0;
  state.screen = 'intro';
  closeMenu();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function goToFinal(){
  state.screen='final';
  render();
}

function renderFinal(){
  const done = answeredCount();
  card.innerHTML = `
    <div class="final">
      <div class="complete-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4c8bf5" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.9 6.3L22 9.2l-5 4.7 1.3 6.9L12 17.5 5.7 20.8 7 13.9 2 9.2l7.1-.9z"></path></svg>
      </div>
      <h2>All 12 concepts complete.</h2>
      <p style="color:var(--muted); line-height:1.65; font-size:14.5px;">You've worked through ${done} of ${TOTAL_Q} questions across convolution basics, padding, every smoothing filter, every sharpening technique, and the Sobel operator. Revisit any concept below whenever you want to reinforce it.</p>
      <div class="actions" style="justify-content:flex-start; gap:10px;">
        <button class="btn btn-primary" onclick="openMenu()">Browse Concepts</button>
        <button class="btn btn-ghost" onclick="restartAll()">Restart Everything</button>
      </div>
    </div>
  `;
}

function restartAll(){
  answered = {};
  state = { screen:'welcome', c:0, q:0 };
  closeMenu();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ---------- Menu overlay ---------- */
function openMenu(){
  const list = document.getElementById('menuList');
  list.innerHTML = DATA.map((c,idx)=>{
    const n = conceptAnsweredCount(idx);
    const total = c.questions.length;
    const done = n===total;
    return `<div class="menu-item ${done?'done':''}" onclick="goToConceptIntro(${idx})">
        <span class="name">${idx+1}. ${c.title}</span>
        <span class="prog">${done ? '✓ done' : n+'/'+total}</span>
      </div>`;
  }).join('');
  document.getElementById('overlay').classList.add('show');
}
function closeMenu(){
  document.getElementById('overlay').classList.remove('show');
}
document.getElementById('overlay').addEventListener('click', (e)=>{
  if(e.target.id==='overlay') closeMenu();
});

/* ---------- tiny ambient animation on the kernel mark ---------- */
(function animateKernelMark(){
  const cells = document.querySelectorAll('#kernelMark span');
  let i = 4; // center index stays highlighted mostly; cycle a soft pulse
  setInterval(()=>{
    cells.forEach(c=>c.classList.remove('c'));
    cells[i].classList.add('c');
    i = (i+1) % cells.length;
  }, 900);
})();

render();
</script>
<script src="js/site.js"></script>
</body>
