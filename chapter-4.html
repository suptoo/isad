/* ============================= STATE ============================= */
const TOTAL = CONCEPTS.reduce((sum,c)=>sum+c.questions.length,0);
let conceptIdx = 0;
let qIdx = 0;
let mode = "intro"; // intro | question | conceptDone | allDone
let answered = false;
let completedCount = 0;
let conceptDoneFlags = CONCEPTS.map(()=>false);

const stage = document.getElementById('stage');
const progressBar = document.getElementById('progressBar');
const progressLabel = document.getElementById('progressLabel');
const conceptLabel = document.getElementById('conceptLabel');
const conceptNav = document.getElementById('conceptNav');
const kernelViz = document.getElementById('kernelViz');

/* ---------- kernel header viz ---------- */
function renderKernel(matrix){
  kernelViz.innerHTML = "";
  matrix.flat().forEach(v=>{
    const cell = document.createElement('div');
    cell.textContent = v;
    kernelViz.appendChild(cell);
  });
}

/* ---------- concept nav ---------- */
function renderConceptNav(){
  conceptNav.innerHTML = "";
  CONCEPTS.forEach((c,i)=>{
    const btn = document.createElement('button');
    btn.textContent = (i+1) + ". " + c.name;
    if(i === conceptIdx) btn.classList.add('active');
    if(conceptDoneFlags[i]) btn.classList.add('done');
    btn.addEventListener('click', ()=>{
      conceptIdx = i;
      qIdx = 0;
      mode = "intro";
      answered = false;
      render();
    });
    conceptNav.appendChild(btn);
  });
}

/* ---------- progress ---------- */
function questionsBeforeConcept(idx){
  let n = 0;
  for(let i=0;i<idx;i++) n += CONCEPTS[i].questions.length;
  return n;
}
function updateProgress(){
  const globalIndex = questionsBeforeConcept(conceptIdx) + qIdx + (mode==="question" || mode==="conceptDone" || mode==="allDone" ? 0 : 0);
  let shown = completedCount;
  progressBar.style.width = (shown/TOTAL*100) + "%";
  progressLabel.textContent = "Question " + Math.min(shown, TOTAL) + " of " + TOTAL;
  conceptLabel.textContent = CONCEPTS[conceptIdx].name;
}

/* ---------- render dispatch ---------- */
function render(){
  renderConceptNav();
  updateProgress();
  if(mode === "intro") renderConceptIntro();
  else if(mode === "question") renderQuestion();
  else if(mode === "conceptDone") renderConceptDone();
  else if(mode === "allDone") renderAllDone();
}

function renderConceptIntro(){
  const c = CONCEPTS[conceptIdx];
  renderKernel(c.kernel);
  stage.innerHTML = "";
  const card = document.createElement('div');
  card.className = "card concept-card";
  card.innerHTML = `
    <div class="concept-tag">Concept ${conceptIdx+1} of ${CONCEPTS.length}</div>
    <h2>${c.name}</h2>
    <p>${c.intro}</p>
    <div class="count-line">${c.questions.length} questions in this concept</div>
    <button class="btn btn-primary" id="startBtn">Start ${c.name} →</button>
  `;
  stage.appendChild(card);
  document.getElementById('startBtn').addEventListener('click', ()=>{
    mode = "question";
    qIdx = 0;
    answered = false;
    render();
  });
}

function renderQuestion(){
  const c = CONCEPTS[conceptIdx];
  const q = c.questions[qIdx];
  renderKernel(c.kernel);
  stage.innerHTML = "";
  const card = document.createElement('div');
  card.className = "card";

  const globalNum = questionsBeforeConcept(conceptIdx) + qIdx + 1;

  card.innerHTML = `
    <div class="q-meta"><span class="num">Q${globalNum}</span> · ${c.name} · ${qIdx+1} of ${c.questions.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="optionsWrap"></div>
    <div id="explainWrap"></div>
    <div class="next-row" id="nextRow"></div>
  `;
  stage.appendChild(card);

  const optionsWrap = card.querySelector('#optionsWrap');
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i)=>{
    const div = document.createElement('div');
    div.className = "option";
    div.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    div.addEventListener('click', ()=> selectOption(i));
    optionsWrap.appendChild(div);
  });

  answered = false;
}

function selectOption(i){
  if(answered) return;
  answered = true;
  const c = CONCEPTS[conceptIdx];
  const q = c.questions[qIdx];
  const optionEls = document.querySelectorAll('#optionsWrap .option');

  optionEls.forEach((el, idx)=>{
    el.classList.add('locked');
    if(idx === q.correct){
      el.classList.add('is-correct');
    }
    if(idx === i && i !== q.correct){
      el.classList.add('is-wrong');
    }
    if(idx !== i && idx !== q.correct){
      el.classList.add('dim');
    }
  });

  const isCorrect = (i === q.correct);
  const explainWrap = document.getElementById('explainWrap');
  const box = document.createElement('div');
  box.className = "explain " + (isCorrect ? "correct" : "wrong");
  box.innerHTML = `<span class="verdict">${isCorrect ? "Correct" : "Not quite"}</span><p>${q.explain}</p>`;
  explainWrap.appendChild(box);

  completedCount++;
  updateProgress();

  const nextRow = document.getElementById('nextRow');
  const btn = document.createElement('button');
  btn.className = "btn btn-primary";
  const isLastInConcept = qIdx === c.questions.length - 1;
  const isLastConcept = conceptIdx === CONCEPTS.length - 1;
  btn.textContent = isLastInConcept ? (isLastConcept ? "Finish review →" : "Finish concept →") : "Next question →";
  btn.addEventListener('click', ()=>{
    if(isLastInConcept){
      conceptDoneFlags[conceptIdx] = true;
      mode = isLastConcept ? "allDone" : "conceptDone";
    } else {
      qIdx++;
      mode = "question";
    }
    render();
  });
  nextRow.appendChild(btn);
}

function renderConceptDone(){
  const c = CONCEPTS[conceptIdx];
  const next = CONCEPTS[conceptIdx+1];
  stage.innerHTML = "";
  const card = document.createElement('div');
  card.className = "card done-card";
  card.innerHTML = `
    <div class="mark">✓</div>
    <h2>${c.name} — complete</h2>
    <p>You've been through all ${c.questions.length} questions on this concept. Next up: <strong style="color:var(--text)">${next.name}</strong>.</p>
    <button class="btn btn-primary" id="continueBtn">Continue →</button>
  `;
  stage.appendChild(card);
  document.getElementById('continueBtn').addEventListener('click', ()=>{
    conceptIdx++;
    qIdx = 0;
    mode = "intro";
    render();
  });
}

function renderAllDone(){
  stage.innerHTML = "";
  const card = document.createElement('div');
  card.className = "card done-card";
  card.innerHTML = `
    <div class="mark">✓</div>
    <h2>All 6 concepts complete</h2>
    <p>You've been through every question on Edge Detection — fundamentals, Laplacian, Sobel, Prewitt, Canny, and the advanced topics. Feel free to jump back into any concept above to revisit an explanation.</p>
    <button class="btn btn-ghost" id="restartBtn">Restart from the beginning</button>
  `;
  stage.appendChild(card);
  document.getElementById('restartBtn').addEventListener('click', ()=>{
    conceptIdx = 0; qIdx = 0; mode = "intro"; completedCount = 0;
    conceptDoneFlags = CONCEPTS.map(()=>false);
    render();
  });
}

render();
</script>
