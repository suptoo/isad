     options:[`They remain completely unchanged from the original source image`,`They become zero (black), because AND-ing any value against a mask region of zero forces the corresponding output pixel to zero`,`They automatically turn pure white`,`They are entirely removed from the array, physically shrinking its shape`],
     correct:1,
     explain:`Since AND requires both inputs to be non-zero for the output to be non-zero, any location where the mask is 0 forces the result to 0 at that location, regardless of what the original image's pixel value was there. The output array keeps its original full dimensions, it is not physically shrunk, but everything outside the masked shape simply becomes black.`},
    {q:`Which combination of concepts would you use to build a simple "vignette" effect, meaning darkened edges with a clear, bright center on a photo?`,
     options:[`Applying image rotation alone, with no other operations`,`Building a radial gradient mask (bright in the center, dark toward the edges) and combining it with the original image through a weighted blend or multiplication`,`Using only a bitwise XOR between two rectangles`,`Splitting the color channels alone, with no further combination step`],
     correct:1,
     explain:`A vignette effect requires brightness to fall off smoothly from the center outward, which is exactly what a radial gradient mask represents, a mask whose values are high near the center and gradually decrease toward the edges. Combining that gradient mask with the original photo, either by multiplying pixel values together or via a weighted blend, darkens the edges progressively while leaving the center largely untouched, producing the classic vignette look.`},
    {q:`Considering everything covered in this lab, reading images, color spaces, properties, channels, resizing/cropping, rotation, blending, and bitwise masking, which best describes a typical basic image-processing pipeline?`,
     options:[`These operations are entirely unrelated to each other and are essentially never used together in practice`,`Load the image (imread) then inspect or convert it as needed (color space checks, property checks) then transform it (resize, crop, or rotate) then combine or mask it (blend or bitwise operations) then save the final result (imwrite), with each step building on the same underlying NumPy array representation`,`Only cv2.imwrite() is ever strictly necessary; every other step is purely optional decoration`,`Bitwise operations must always be performed before cv2.imread() is even called`],
     correct:1,
     explain:`Nearly every real image-processing task follows some version of this same overall shape: bring the data in as an array, understand and normalize its representation (color space, shape, channels), geometrically transform it to the region or size you actually need, combine it with other data or masks to achieve the desired effect, and finally persist the result back to disk. Every concept in this lab, from imread() through bitwise_and(), is a building block that plugs into one of these stages, which is exactly why they were introduced together as a single coherent lab.`}
  ]
}
];

const flat = [];
DATA.forEach((concept, ci)=>{
  concept.questions.forEach((q, qi)=>{
    flat.push({ci, qi, conceptCode:concept.code, conceptTitle:concept.title, ...q});
  });
});
const TOTAL = flat.length;
const answers = new Array(TOTAL).fill(null);
let current = 0;

const conceptListEl = document.getElementById("conceptList");
const overallBar = document.getElementById("overallBar");
const overallLabel = document.getElementById("overallLabel");
const topBar = document.getElementById("topBar");
const qPosLabel = document.getElementById("qPosLabel");
const qPctLabel = document.getElementById("qPctLabel");
const introSlot = document.getElementById("introSlot");
const questionSlot = document.getElementById("questionSlot");
const finishSlot = document.getElementById("finishSlot");
const doneBanner = document.getElementById("doneBanner");

function conceptRange(ci){
  let start = 0;
  for(let i=0;i<ci;i++) start += DATA[i].questions.length;
  return [start, start + DATA[ci].questions.length];
}

function conceptAnsweredCount(ci){
  const [s,e] = conceptRange(ci);
  let n = 0;
  for(let i=s;i<e;i++) if(answers[i]) n++;
  return n;
}

function renderSidebar(){
  conceptListEl.innerHTML = "";
  DATA.forEach((concept, ci)=>{
    const [s,e] = conceptRange(ci);
    const answeredN = conceptAnsweredCount(ci);
    const total = e - s;
    const li = document.createElement("li");
    li.className = "concept-item" + (ci===flat[current].ci ? " active":"") + (answeredN===total ? " done":"");
    li.innerHTML = `<span class="c-code">${concept.code}</span><span class="c-name">${concept.title}</span><span class="c-count">${answeredN}/${total}</span>`;
    li.addEventListener("click", ()=>{ current = s; render(); });
    conceptListEl.appendChild(li);
  });
}

function renderTopProgress(){
  const answeredTotal = answers.filter(a=>a).length;
  const pct = Math.round((answeredTotal/TOTAL)*100);
  overallBar.style.width = pct + "%";
  overallLabel.textContent = answeredTotal + " / " + TOTAL;
  topBar.style.width = Math.round(((current+1)/TOTAL)*100) + "%";
  qPosLabel.textContent = "Q" + (current+1) + " of " + TOTAL;
  qPctLabel.textContent = pct + "% learned";
}

function renderIntro(item, isFirstOfConcept){
  introSlot.innerHTML = "";
  doneBanner.innerHTML = "";
  if(item.qi === 0){
    if(item.ci > 0){
      const prev = DATA[item.ci-1];
      const banner = document.createElement("div");
      banner.className = "banner-done";
      banner.textContent = "Concept " + prev.code + " complete — " + prev.title + ". Moving on to " + item.conceptCode + ".";
      doneBanner.appendChild(banner);
    }
    const card = document.createElement("div");
    card.className = "intro-card";
    card.innerHTML = `<div class="tag">${item.conceptCode} · Concept</div><h2>${item.conceptTitle}</h2><p>${DATA[item.ci].intro}</p>`;
    introSlot.appendChild(card);
  }
}

function letterFor(i){ return ["A","B","C","D"][i]; }

function renderQuestion(){
  const item = flat[current];
  questionSlot.innerHTML = "";
  finishSlot.innerHTML = "";

  const card = document.createElement("div");
  card.className = "q-card";

  const strip = document.createElement("div");
  strip.className = "q-channels";
  strip.innerHTML = `<span style="background:var(--chan-r)"></span><span style="background:var(--chan-g)"></span><span style="background:var(--chan-b)"></span>`;
  card.appendChild(strip);

  const body = document.createElement("div");
  body.className = "q-body";

  const meta = document.createElement("div");
  meta.className = "q-meta";
  meta.textContent = item.conceptCode + " · question " + (item.qi+1) + " of " + DATA[item.ci].questions.length + " in this concept";
  body.appendChild(meta);

  const qtext = document.createElement("p");
  qtext.className = "q-text";
  qtext.textContent = item.q;
  body.appendChild(qtext);

  const optsWrap = document.createElement("div");
  optsWrap.className = "options";

  const existing = answers[current];

  item.options.forEach((optText, i)=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.innerHTML = `<span class="letter">${letterFor(i)}</span><span>${optText}</span>`;

    if(existing){
      btn.classList.add("locked");
      if(i === item.correct){
        btn.classList.add("reveal-correct");
        const tag = document.createElement("span");
        tag.className = "result-tag";
        tag.textContent = "CORRECT";
        btn.appendChild(tag);
      }
      if(i === existing.selected && existing.selected !== item.correct){
        btn.classList.remove("reveal-correct");
        btn.classList.add("wrong-pick");
        const tag = document.createElement("span");
        tag.className = "result-tag";
        tag.textContent = "YOUR PICK";
        btn.appendChild(tag);
      }
      if(i === existing.selected && existing.selected === item.correct){
        btn.classList.add("correct-pick");
      }
      if(i !== item.correct && i !== existing.selected){
        btn.classList.add("dim");
      }
    } else {
      btn.addEventListener("click", ()=>{
        const isCorrect = i === item.correct;
        answers[current] = {selected:i, correct:isCorrect};
        render();
      });
    }
    optsWrap.appendChild(btn);
  });

  body.appendChild(optsWrap);

  if(existing){
    const exp = document.createElement("div");
    exp.className = "explain " + (existing.correct ? "is-correct":"is-wrong");
    exp.innerHTML = `<div class="exp-label">${existing.correct ? "Correct — why":"Not quite — here is why"}</div><p>${item.explain}</p>`;
    body.appendChild(exp);
  }

  card.appendChild(body);

  const nav = document.createElement("div");
  nav.className = "nav-row";

  const prevBtn = document.createElement("button");
  prevBtn.className = "btn";
  prevBtn.textContent = "← Previous";
  prevBtn.disabled = current === 0;
  prevBtn.addEventListener("click", ()=>{ current = Math.max(0, current-1); render(); });

  const rightWrap = document.createElement("div");
  rightWrap.style.display = "flex";
  rightWrap.style.alignItems = "center";
  rightWrap.style.gap = "12px";

  if(!existing){
    const hint = document.createElement("span");
    hint.className = "hint";
    hint.textContent = "select an option to reveal the explanation";
    rightWrap.appendChild(hint);
  }

  const nextBtn = document.createElement("button");
  nextBtn.className = "btn primary";
  nextBtn.textContent = current === TOTAL-1 ? "Finish" : "Next question →";
  nextBtn.disabled = !existing;
  nextBtn.addEventListener("click", ()=>{
    if(current === TOTAL-1){
      showCompletion();
    } else {
      current += 1;
      render();
    }
  });
  rightWrap.appendChild(nextBtn);

  nav.appendChild(prevBtn);
  nav.appendChild(rightWrap);
  card.appendChild(nav);

  questionSlot.appendChild(card);
}

function showCompletion(){
  questionSlot.innerHTML = "";
  introSlot.innerHTML = "";
  doneBanner.innerHTML = "";
  const answeredTotal = answers.filter(a=>a).length;
  const correctTotal = answers.filter(a=>a && a.correct).length;

  const wrap = document.createElement("div");
  wrap.className = "done-screen";
  wrap.innerHTML = `
    <div class="stripe-mini"><span style="background:var(--chan-r)"></span><span style="background:var(--chan-g)"></span><span style="background:var(--chan-b)"></span></div>
    <h2>All 10 concepts complete</h2>
    <p>You have worked through every question on image reading, color spaces, properties, channels, format conversion, resizing/cropping, rotation, blending, and bitwise masking, with a full explanation attached to each one.</p>
    <div class="stat-row">
      <div class="stat"><div class="num">${answeredTotal}/${TOTAL}</div><div class="lab">answered</div></div>
      <div class="stat"><div class="num">${correctTotal}</div><div class="lab">correct on first try</div></div>
      <div class="stat"><div class="num">10/10</div><div class="lab">concepts done</div></div>
    </div>
    <button class="btn primary" id="restartBtn">Restart from question 1</button>
  `;
  finishSlot.appendChild(wrap);
  document.getElementById("restartBtn").addEventListener("click", ()=>{
    answers.fill(null);
    current = 0;
    render();
  });
  renderSidebarDone();
  renderTopProgress();
}

function renderSidebarDone(){
  renderSidebar();
}

function render(){
  finishSlot.innerHTML = "";
  renderSidebar();
  renderTopProgress();
  renderIntro(flat[current]);
  renderQuestion();
}

render();
</script>
<script src="js/site.js"></script>
</body>
</html>
