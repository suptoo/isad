    {q:"A classic application of the log transformation is:",

    {q:"What is a key risk of using min-max stretching (image.min(), image.max()) if the image contains a single very bright or very dark outlier pixel (e.g. sensor noise)?",

{
  name:"Histogram Processing & Equalization",
  formula:"Equalization: s = round[(L-1) · CDF(r)], where CDF is the cumulative distribution of pixel intensities",
  desc:"A histogram counts how many pixels exist at each intensity level. Histogram equalization is a data-driven, automatic technique that redistributes those levels to spread the histogram out and boost overall contrast.",
  questions:[
    {q:"What does an image's histogram represent?",
     opts:["The physical size of the image in pixels","The frequency (count) of pixels at each possible intensity level","The color palette used by the image file format","The compression ratio of the image"],
     a:1, ex:"A histogram is essentially a bar chart with intensity levels (0–255 for 8-bit images) on the horizontal axis and the number of pixels having each intensity on the vertical axis. It's a compact statistical summary of an image's overall brightness and contrast characteristics, without any information about where those pixels are spatially located."},
    {q:"What is the primary purpose of histogram equalization?",
     opts:["To remove all color from an image","To enhance contrast by redistributing intensity values so they are spread more evenly across the available range","To rotate the image histogram by 90 degrees","To compress the image file size"],
     a:1, ex:"When an image's histogram is bunched up in a narrow range (as in a low-contrast image), histogram equalization computes a transformation that spreads those values out toward a more uniform distribution across the full 0–255 range, boosting overall contrast and revealing detail that was previously compressed into a small band of values."},
    {q:"Histogram equalization's transformation function is based on which statistical concept?",
     opts:["The mode of the histogram only","The cumulative distribution function (CDF) of the pixel intensities","The image's file compression algorithm","The standard deviation of the RGB channels"],
     a:1, ex:"The equalization mapping for each intensity level is derived from the cumulative distribution function (CDF) — essentially a running total of how many pixels have intensity less than or equal to that level, normalized and scaled to the output range. Levels with many pixels 'below' them in the CDF get pushed further along the output range."},
    {q:"What is the general formula used to compute the new intensity value in histogram equalization?",
     opts:["s = (L-1) - r","s = round[(L-1) · CDF(r)], where CDF(r) is the normalized cumulative distribution up to intensity r","s = c · log(r)","s = r^2"],
     a:1, ex:"For each intensity r, you compute the cumulative sum of the histogram up to and including r, normalize it by the total pixel count (giving a value between 0 and 1), and scale by (L-1) — typically 255 — to get the new mapped intensity s. This automatically derives a transformation function directly from the image's own statistics."},
    {q:"How does histogram equalization fundamentally differ from manual contrast stretching?",
     opts:["They are the same technique","Histogram equalization automatically derives its transformation from the image's actual intensity distribution (data-driven and generally nonlinear), while contrast stretching uses a manually chosen or min/max-based linear mapping","Contrast stretching always produces better results","Histogram equalization requires manually picking r1 and r2 points"],
     a:1, ex:"Contrast stretching needs you to pick (or compute via min/max) specific input/output points and applies a straight-line mapping between them. Histogram equalization instead looks at the entire distribution of pixel values and computes a mapping — generally a curve, not a straight line — tailored to that specific image's statistics, with no manual point selection needed."},
    {q:"After histogram equalization, what does the resulting histogram ideally look like?",
     opts:["Identical to the original histogram","Flatter and more uniformly spread across the intensity range than before (though rarely perfectly flat for real, discrete images)","Compressed into an even narrower band than before","Completely empty"],
     a:1, ex:"The theoretical goal is a perfectly flat (uniform) histogram, where each intensity level occurs with equal frequency. In practice, because real images have discrete integer intensity levels and specific pixel counts, the result is only approximately flat — noticeably more spread out than the original, but with some remaining unevenness due to quantization."},
    {q:"What is a potential drawback of applying global histogram equalization to an entire image?",
     opts:["It always makes the image completely black","It can over-enhance noise and may not handle images with strong local (regional) contrast variation well, since it uses one single global transformation for the whole image","It cannot be implemented without a GPU","It only works on already high-contrast images"],
     a:1, ex:"Because global equalization applies one transformation function derived from the whole image's histogram, it treats every region the same way — this can amplify noise in already-noisy areas and can fail to properly enhance a specific region if that region's local contrast characteristics differ significantly from the image's overall average, motivating the development of localized/adaptive methods."},
    {q:"What technique improves on plain global histogram equalization by processing small local regions of the image separately?",
     opts:["Bit-plane slicing","Adaptive or local histogram equalization (e.g. CLAHE — Contrast Limited Adaptive Histogram Equalization)","Image negative","Simple thresholding"],
     a:1, ex:"Adaptive histogram equalization divides the image into smaller tiles and equalizes each region using its own local histogram, then blends the results smoothly. CLAHE additionally 'clips' the histogram before computing the CDF to limit noise amplification — this handles images with varying illumination or localized contrast far better than a single global transformation."},
    {q:"Which OpenCV function performs automatic (global) histogram equalization on a grayscale image?",
     opts:["cv2.imread()","cv2.equalizeHist()","cv2.negative()","cv2.resize()"],
     a:1, ex:"cv2.equalizeHist() takes an 8-bit single-channel (grayscale) image and returns a new image with its histogram automatically equalized using the standard CDF-based mapping — implementing exactly the algorithm students are asked to reproduce manually in the lab's exercises."},
    {q:"When applying histogram equalization to a color image, what is the recommended approach to avoid distorting colors?",
     opts:["Equalize the R, G, and B channels completely independently of each other","Convert to a color space that separates brightness from color (like YCrCb or HSV), equalize only the luminance/value channel, then convert back","Histogram equalization cannot be applied to color images at all","Only equalize the blue channel"],
     a:1, ex:"Equalizing R, G, and B independently can shift the relative balance between channels and introduce unnatural color shifts, since each channel's histogram is stretched differently. Instead, converting to a color space like YCrCb or HSV and equalizing only the luminance (Y) or value (V) channel — which carries brightness information — enhances contrast while leaving the hue/color information (Cr, Cb, or H, S) untouched."},
    {q:"What are the general steps to implement histogram equalization manually, without using cv2.equalizeHist()?",
     opts:["Just apply a Gaussian blur to the image","Compute the image's histogram, compute its normalized cumulative distribution (CDF), scale the CDF to the output range, then remap each original pixel using that scaled CDF as a lookup table","Simply multiply every pixel by 2","Sort all pixels from darkest to brightest and reverse the order"],
     a:1, ex:"The manual process mirrors the mathematical definition: (1) tally how many pixels exist at each intensity level to build the histogram, (2) accumulate those counts into a running cumulative sum (the CDF), (3) normalize and scale that CDF to the 0–(L-1) output range, and (4) use the scaled CDF values as a lookup table to remap every original pixel value to its new equalized value."},
    {q:"Besides enhancement, what other common use does an image's histogram serve?",
     opts:["Determining the exact GPS location where the photo was taken","Analyzing overall brightness/contrast characteristics and supporting automatic threshold selection methods, such as Otsu's method","Compressing the image to a smaller file size","Detecting the camera model used"],
     a:1, ex:"Beyond enhancement, histograms are a diagnostic and analytical tool: they reveal at a glance whether an image is generally dark, bright, low-contrast, or high-contrast, and they underpin automatic thresholding algorithms like Otsu's method, which analyzes the histogram shape to find an optimal separation point between foreground and background pixel populations."},
    {q:"What does a strongly bimodal histogram (two separate peaks) typically indicate about an image?",
     opts:["The image file is corrupted","There are likely two dominant intensity groups — often a foreground object and background — which is useful information for choosing a threshold value","The image must be in color, not grayscale","The image has no usable content"],
     a:1, ex:"A bimodal histogram, with one cluster of pixels around a darker value and another around a lighter value, often corresponds to a simple scene with a clear foreground object against a contrasting background. The 'valley' between the two peaks is frequently used as a natural threshold value for segmenting the object from the background."},
    {q:"For a typical low-contrast, dark image (histogram clustered near the low end), what does histogram equalization generally achieve?",
     opts:["It moves all pixels to exactly 128","It increases the effective dynamic range by spreading the clustered low values across a much wider portion of the 0–255 scale, revealing previously hidden detail","It has no measurable effect on such images","It makes the image completely black"],
     a:1, ex:"Since the pixel values in a dark, low-contrast image are crowded into a narrow low-intensity band, the CDF rises sharply within that band. Equalization maps that steep rise across a much wider output range, effectively 'stretching apart' the tightly packed original values and making subtle tonal differences in the shadows far more visible."},
    {q:"Is histogram equalization classified as a point processing operation?",
     opts:["No, because it depends on the whole image's histogram, not just one pixel","Yes — each output pixel is still computed purely from its own input value via s = T(r); T is just derived globally from the whole image's histogram rather than a fixed formula","No, because it always requires a neighborhood of pixels like spatial filtering","It is a frequency-domain operation, not a spatial-domain one"],
     a:1, ex:"Even though the transformation function T itself is computed by analyzing the entire image's histogram, once that function (the scaled CDF lookup table) is built, applying it to any individual pixel only requires that pixel's own original value — no neighboring pixels are consulted during the actual mapping step. That makes histogram equalization a point processing operation, just one whose T(r) happens to be data-derived rather than fixed by a simple formula."},
    {q:"Comparing histogram equalization to gamma correction, which statement is most accurate?",
     opts:["Gamma correction is always superior for every image","Gamma correction applies a fixed-shape formula with a manually chosen exponent, while histogram equalization automatically computes its mapping from the image's own statistics, often giving stronger and more image-specific contrast enhancement","They produce mathematically identical results in every case","Histogram equalization cannot be combined with gamma correction"],
     a:1, ex:"Gamma correction requires the user to choose γ based on intuition or experimentation, applying the same curve shape regardless of the specific image's content. Histogram equalization instead analyzes that specific image's pixel distribution and computes a custom mapping automatically — the lab's own exercise, which compares both side-by-side, is designed precisely to highlight how differently these two approaches enhance the same dark image."}
  ]
},
{

    {q:"What does bit-plane slicing do to an 8-bit grayscale image?",

    {q:"Which bit-plane typically contains the most visually significant information about the image?",
     opts:["Bit 0 (the least significant bit, LSB)","Bit 7 (the most significant bit, MSB)","All bit-planes contribute equally","Bit 4, the middle bit"],
     a:1, ex:"The most significant bit (bit 7) represents the largest numerical contribution to each pixel's value (128 out of 255), so it carries the coarse structure and major shapes of the image. Higher-order bit-planes closer to the MSB generally look much more like a recognizable, if lower-detail, version of the original image."},
    {q:"What does the least significant bit (LSB, bit 0) plane typically look like when displayed?",
     opts:["An exact copy of the original image","Largely noise-like and random, with little recognizable structure","Completely black with no variation","Identical to the MSB plane"],
     a:1, ex:"The LSB contributes the smallest possible numerical value (just 1) to each pixel, so its pattern is heavily influenced by fine texture, noise, and small variations rather than the dominant shapes in the scene — when displayed on its own, it typically looks like scattered visual noise rather than a coherent image."},
    {q:"How do you mathematically extract bit-plane n from a pixel value?",
     opts:["pixel + n","(pixel >> n) & 1 — right-shift the pixel by n bits, then mask with 1 to isolate that bit","pixel * n","pixel / (2^n) with no rounding"],
     a:1, ex:"Right-shifting (>>) the pixel value by n positions moves bit n down to the least-significant position, and then applying a bitwise AND with 1 (& 1) isolates just that single bit, discarding all others. The result is either 0 or 1 for each pixel, which can then be scaled (e.g. multiplied by 255) for visible display as a binary image."},
    {q:"How many distinct bit-planes exist for a standard 8-bit grayscale image?",
     opts:["4","8","16","256"],
     a:1, ex:"An 8-bit image stores each pixel using 8 binary digits, numbered bit 0 (LSB) through bit 7 (MSB), so exactly 8 separate bit-planes can be extracted — one corresponding to each bit position in the pixel's binary representation."},
    {q:"What is one practical application of bit-plane slicing in image compression?",
     opts:["It has no use in compression","Reconstructing an approximation of the original image using only the higher-order bit-planes (which carry most visual information), discarding lower-order planes to save space","It doubles the file size for higher quality","It converts images to lossless PNG only"],
     a:1, ex:"Because the higher bit-planes (especially the MSB and next few bits) contain the bulk of the visually important structure, an approximate reconstruction using just the top 3–4 planes can look reasonably close to the original while requiring far less data than storing all 8 planes — a simple form of lossy compression based on bit significance."},
    {q:"Bit-plane slicing is also useful for which security-related application?",
     opts:["Firewall configuration","Steganography — hiding secret data within an image by embedding it into the least significant bit plane, since changes there cause minimal visible distortion","Password hashing","Network encryption"],
     a:1, ex:"Because modifying the LSB plane changes each pixel's value by at most 1, such changes are typically imperceptible to the human eye. This makes the LSB plane a common hiding spot in steganography, where secret data (like a hidden message or watermark) is embedded there without noticeably altering the visible appearance of the image."},
    {q:"If you wanted to embed a hidden watermark with the least possible visual impact using bit-plane manipulation, which bit-plane would you modify?",
     opts:["Bit 7 (MSB)","Bit 0 (LSB)","Bit 4","It doesn't matter, all bits have equal visual impact"],
     a:1, ex:"Modifying the LSB (bit 0) changes each affected pixel's value by only ±1 out of a possible 0–255 range — a change generally too small for the human eye to notice. Modifying the MSB (bit 7), by contrast, can shift a pixel's value by up to 128, causing dramatic and very visible distortion."},
    {q:"Each individual bit-plane, once extracted, is what type of image?",
     opts:["A full 8-bit grayscale image with 256 possible values","A binary image, where each pixel is either 0 or 1 (often displayed as 0 or 255)","A color (RGB) image","An image with negative pixel values"],

    {q:"Is bit-plane slicing considered a point processing or spatial (neighborhood) processing operation?",
     opts:["Spatial processing, because it requires a filtering kernel","Point processing — each pixel's bit value is extracted independently from its own value, with no reference to neighboring pixels","Neither — it operates only in the frequency domain","It depends on the image format used"],
     a:1, ex:"Extracting bit n from a pixel only requires that single pixel's own intensity value — a shift-and-mask operation performed independently for every pixel — with no involvement of any surrounding pixels. This makes bit-plane slicing a point processing technique, in the same family as negative, log, and gamma transformations."}

{
  name:"Arithmetic & Logic Operations",
  formula:"Pixel-wise: add, subtract, multiply, divide, AND, OR, NOT, XOR between two images (or an image and a constant)",
  desc:"Beyond single-image intensity transforms, two images (or an image and a mask/constant) can be combined pixel-by-pixel using arithmetic or logical operators for tasks like difference detection, noise reduction, and masking.",
  questions:[
    {q:"What is a common application of image subtraction?",
     opts:["Increasing image resolution","Detecting differences between two images, such as motion detection, background subtraction, or medical digital subtraction angiography","Converting grayscale to color","Sharpening edges"],
     a:1, ex:"Subtracting one image from another (pixel by pixel) highlights exactly where the two images differ, while regions that are identical cancel out to near-zero. This is the basis of motion detection (comparing consecutive video frames), background subtraction, and medical techniques like digital subtraction angiography, where a 'before' image is subtracted from an 'after' image to reveal blood vessels filled with contrast dye."},
    {q:"How can image addition (or averaging multiple images) be used for noise reduction?",
     opts:["Adding images always increases noise, never reduces it","Averaging several noisy frames of the same static scene tends to cancel out random noise, since the true signal stays consistent while the random noise partially cancels across frames","It has no effect on noise, only brightness","It works only on already noise-free images"],
     a:1, ex:"If you capture multiple frames of the same unchanging scene, the true underlying signal is the same in every frame, but random noise (e.g. sensor noise) differs randomly from frame to frame. Averaging many such frames together lets the consistent signal reinforce itself while the random noise partially cancels out, effectively reducing noise — a technique widely used in astrophotography and low-light imaging."},
    {q:"What is a typical use of image multiplication or division in enhancement?",
     opts:["Rotating the image","Shading correction (compensating for uneven illumination) or masking a specific region of interest by multiplying with a binary mask","Converting the image to a video","Deleting pixels below a certain value"],
     a:1, ex:"Multiplying an image by a spatially varying correction factor can compensate for uneven illumination across the scene (shading correction), while multiplying by a binary mask (an image of 0s and 1s) can isolate and keep only a specific region of interest, zeroing out everything else — both are common preprocessing steps before further analysis."},
    {q:"What do logic operations like AND, OR, and NOT typically accomplish when applied to images?",
     opts:["They can only be applied to text files, not images","They enable masking, combining, or isolating specific regions of an image, often using a binary mask alongside the original image","They automatically resize the image","They convert grayscale images into color"],
     a:1, ex:"Bitwise logic operations work particularly well with binary masks: ANDing an image with a mask keeps only the pixels where the mask is 'on' (isolating a region of interest), ORing can combine two images or add a shape into a scene, and NOT can invert a mask or a binary image entirely — these are foundational tools for compositing and region extraction."},
    {q:"What issue can arise from directly applying arithmetic operations like addition or multiplication to pixel values?",
     opts:["There is never any issue, results always stay valid","Overflow or underflow — resulting values may fall outside the valid 0–255 range for 8-bit images, requiring clipping or normalization","The image automatically becomes a different file format","Arithmetic operations cannot be applied to grayscale images at all"],
     a:1, ex:"If two bright pixels are added together, the sum can easily exceed 255 (the maximum for an 8-bit image); similarly, subtraction can produce negative values. Without careful handling — clipping results to the valid range or normalizing/rescaling the output — these out-of-range values can wrap around or produce visually incorrect artifacts, so most implementations explicitly clip or cast results appropriately."},
    {q:"When averaging K independent noisy images of the same scene to reduce noise, what kind of noise does this technique primarily reduce?",
     opts:["Only compression artifacts","Random noise (such as Gaussian sensor noise), since independent random fluctuations tend to average toward zero as more frames are combined","Only color distortion","Motion blur"],
     a:1, ex:"Averaging is effective specifically against random, statistically independent noise across frames — as more frames (K) are averaged, the noise's effect diminishes roughly proportional to 1/√K, while the true, consistent signal remains. It does not help with systematic errors (like a fixed sensor defect) that are identical in every frame, since averaging wouldn't cancel something that never varies."},
    {q:"What is a basic requirement for performing bitwise logic operations (AND, OR, XOR) between two images?",
     opts:["The two images must be from different cameras","The two images must have the same dimensions (and typically compatible data types), so each pixel has a corresponding pixel in the other image","One image must be in color and the other grayscale","There is no requirement, any two images can be combined"],
     a:1, ex:"Pixel-wise operations, whether arithmetic or logical, pair up corresponding pixels at the same (row, column) position in both images. If the images have different dimensions, there's no well-defined pairing, so both images (or an image and its mask) must share the same width and height — and typically the same data type — for the operation to be applied correctly."}
  ]
},
{
  name:"Linear vs Nonlinear Operations",
  formula:"Linear: H(a·f1 + b·f2) = a·H(f1) + b·H(f2). Nonlinear: this superposition property does not hold.",
  desc:"A final unifying lens on everything covered: classifying each technique in this lab as linear or nonlinear helps explain why some transformations apply uniform scaling while others selectively reshape specific intensity ranges.",
  questions:[
    {q:"What mathematical property defines a linear operation?",
     opts:["It must always increase brightness","It satisfies additivity and homogeneity (superposition): H(a·f1 + b·f2) = a·H(f1) + b·H(f2)","It must only work on binary images","It must run faster than nonlinear operations"],
     a:1, ex:"A linear operation preserves the superposition principle: scaling an input and then applying the operation gives the same result as applying the operation and then scaling (homogeneity), and applying the operation to a sum of two inputs gives the same result as summing the individually-processed outputs (additivity). Any operation that fails this test — including all the curved transformations in this lab — is classified as nonlinear."},
    {q:"Which of the following are examples of linear point operations covered in this lab?",
     opts:["Log transformation and gamma correction","Image negative and the linear/min-max cases of contrast stretching, since both follow straight-line mappings","Histogram equalization only","Bit-plane slicing only"],
     a:1, ex:"Image negative (s = (L-1) - r) and the straight-line cases of contrast stretching both plot as straight lines on the input-vs-output graph, satisfying the proportional, straight-line behavior required of a linear operation. In contrast, log and gamma transforms curve, and histogram equalization's mapping is data-derived and generally nonlinear."},
    {q:"Why are log and power-law (gamma) transformations classified as nonlinear?",
     opts:["Because they are implemented using for-loops","Because their output is not a straight-line, proportional function of the input — equal steps in r do not produce equal steps in s","Because they only work on color images","Because they require more code than linear operations"],
     a:1, ex:"Both log and gamma transformations produce curves rather than straight lines: a fixed increase in r produces a different-sized change in s depending on where you are along the curve (larger changes in the dark region for log/low-gamma, for example). This non-proportional, curve-based behavior is exactly what fails the linear superposition test and defines them as nonlinear."},
    {q:"Why might you deliberately choose a nonlinear transformation over a simple linear one?",
     opts:["Nonlinear transformations are always faster to compute","Nonlinear transformations can selectively enhance specific intensity ranges (like just the dark shadows, or just the highlights) unevenly, which a uniform linear scaling cannot achieve","Linear transformations cannot be implemented in Python","There is no real reason; linear is always preferable"],
     a:1, ex:"A linear transformation stretches or shifts all intensity values by the same proportional amount everywhere. If you specifically want to boost detail hidden in dark shadows without over-brightening the highlights (or vice versa), you need a curve whose slope changes across the intensity range — which is exactly what nonlinear operations like log and gamma provide."},
    {q:"Is histogram equalization classified as a linear or nonlinear operation?",
     opts:["Always linear, since it uses simple counting","Generally nonlinear — its transformation function, derived from the cumulative distribution, is typically a curve rather than a straight line, even though it is still a monotonic (order-preserving) mapping","It's linear only for grayscale images","It cannot be classified as either"],
     a:1, ex:"Although histogram equalization's mapping is monotonic (it never reverses the relative order of intensities), the specific shape of that mapping is dictated by the image's cumulative distribution function, which is rarely a straight line for a real image's histogram — it curves based on wherever pixel counts are concentrated. This data-dependent, curved mapping places histogram equalization firmly in the nonlinear category, alongside log and gamma transformations."}
  ]
}
];

/* ---------- state & rendering ---------- */
let ci = 0, qi = 0, phase = 'intro', answered = false, chosen = -1;

function totalQuestions(){return DATA.reduce((s,c)=>s+c.questions.length,0);}
function answeredSoFar(){
  let n = 0;
  for(let k=0;k<ci;k++) n += DATA[k].questions.length;
  n += qi;
  return n;
}

const app = document.getElementById('app');
const progressMask = document.getElementById('progressMask');
const progressMarker = document.getElementById('progressMarker');
const progressText = document.getElementById('progressText');
const progressConcept = document.getElementById('progressConcept');

function updateProgress(){
  const total = totalQuestions();
  let done = answeredSoFar();
  if(phase==='final') done = total;
  const pct = Math.max(0, Math.min(100, (done/total)*100));
  progressMask.style.width = (100-pct)+'%';
  progressMarker.style.left = pct+'%';
  progressText.innerHTML = 'Question <b>'+Math.min(done+ (phase==='question'?1:0), total)+'</b> of '+total;
  progressConcept.textContent = ci < DATA.length ? DATA[ci].name : 'Complete';
}

function render(){
  updateProgress();
  if(phase==='intro'){
    const c = DATA[ci];
    app.innerHTML = `
      <div class="card">
        <div class="eyebrow">Concept ${ci+1} of ${DATA.length}</div>
        <h2 class="concept-title">${c.name}</h2>
        <p class="concept-desc">${c.desc}</p>
        <div class="formula">${c.formula}</div>
        <div class="btn-row"><button class="btn" id="beginBtn">Begin — ${c.questions.length} questions</button></div>
      </div>`;
    document.getElementById('beginBtn').onclick = ()=>{ phase='question'; qi=0; answered=false; chosen=-1; render(); };
  }
  else if(phase==='question'){
    const c = DATA[ci];
    const q = c.questions[qi];
    const letters = ['A','B','C','D'];
    app.innerHTML = `
      <div class="card">
        <div class="eyebrow">${c.name}</div>
        <div class="q-count">Question ${qi+1} of ${c.questions.length} in this concept · Overall ${answeredSoFar()+1}/${totalQuestions()}</div>
        <div class="q-text">${q.q}</div>
        <div id="opts"></div>
        <div id="explainWrap"></div>
        <div class="btn-row" id="btnRow"></div>
      </div>`;
    const optsWrap = document.getElementById('opts');
    q.opts.forEach((opt,i)=>{
      const div = document.createElement('button');
      div.className = 'opt';
      div.innerHTML = `<span class="tag">${letters[i]}</span><span>${opt}</span>`;
      div.onclick = ()=> selectOption(i);
      optsWrap.appendChild(div);
    });
    if(answered) paintAnswer();
  }
  else if(phase==='concept-done'){
    const c = DATA[ci];
    app.innerHTML = `
      <div class="card">
        <div class="done-icon">&#10003;</div>
        <div class="eyebrow">Concept Complete</div>
        <h2 class="concept-title">${c.name}</h2>
        <p class="concept-desc">You've worked through all ${c.questions.length} questions on this concept. Quick recap of the core idea:</p>
        <div class="formula">${c.formula}</div>
        <ul class="recap"><li>${c.desc}</li></ul>
        <div class="btn-row"><button class="btn" id="contBtn">${ci+1<DATA.length ? 'Continue to next concept' : 'Finish'}</button></div>
      </div>`;
    document.getElementById('contBtn').onclick = ()=>{
      if(ci+1 < DATA.length){ ci++; phase='intro'; }
      else { phase='final'; }
      render();
    };
  }
  else if(phase==='final'){
    app.innerHTML = `
      <div class="card" style="text-align:center;">
        <div class="done-icon" style="margin:0 auto 14px;">&#9733;</div>
        <div class="eyebrow" style="justify-content:center;">All Concepts Complete</div>
        <h2 class="final-title">100 questions done.</h2>
        <p class="final-sub">You've worked through gray-level transformations, negative, log, gamma, contrast stretching, intensity slicing, histogram processing, bit-plane slicing, arithmetic/logic operations, and linear vs. nonlinear behavior — with a full explanation on every answer.</p>
        <div class="btn-row" style="justify-content:center;"><button class="btn ghost" id="restartBtn">Restart from the beginning</button></div>
      </div>`;
    document.getElementById('restartBtn').onclick = ()=>{ ci=0; qi=0; phase='intro'; answered=false; chosen=-1; render(); };
  }
}

function selectOption(i){
  if(answered) return;
  answered = true;
  chosen = i;
  paintAnswer();
}

function paintAnswer(){
  const c = DATA[ci];
  const q = c.questions[qi];
  const optEls = document.querySelectorAll('#opts .opt');
  optEls.forEach((el,i)=>{
    el.setAttribute('disabled','true');
    if(i===q.a) el.classList.add('correct');
    else if(i===chosen) el.classList.add('wrong');
    else el.classList.add('dim');
  });
  const isCorrect = chosen === q.a;
  const explainWrap = document.getElementById('explainWrap');
  explainWrap.innerHTML = `
    <div class="verdict ${isCorrect?'ok':'no'}">${isCorrect ? '✓ Correct' : '✗ Not quite — the correct answer is highlighted in blue'}</div>
    <div class="explain">${q.ex}</div>`;
  const btnRow = document.getElementById('btnRow');
  const isLast = qi+1 >= c.questions.length;
  btnRow.innerHTML = `<button class="btn" id="nextBtn">${isLast ? 'Finish this concept' : 'Next question'}</button>`;
  document.getElementById('nextBtn').onclick = ()=>{
    if(isLast){ phase='concept-done'; }
    else { qi++; answered=false; chosen=-1; phase='question'; }
    render();
  };
}

render();
</script>
<script src="js/site.js"></script>
</body>
